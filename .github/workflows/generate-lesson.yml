name: Automatische lesgeneratie

on:
  # Trigger bij het toevoegen van het label 'nieuwe-les'
  issues:
    types: [labeled]

  # Elk uur als vangnet voor gemiste issues
  schedule:
    - cron: '0 * * * *'

  # Handmatige trigger voor testen
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue nummer om te verwerken'
        required: true
        type: number
      ai_provider:
        description: 'AI provider (deepseek of claude)'
        required: false
        default: 'claude'
        type: choice
        options:
          - claude
          - deepseek

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'nieuwe-les') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python opzetten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pillow installeren (afbeeldingscompressie)
        run: pip install Pillow

      - name: Bepaal te verwerken issues
        id: issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_numbers=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            echo "issue_numbers=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            # Cron: zoek open issues met 'nieuwe-les' maar zonder 'verwerkt'
            ISSUES=$(gh issue list \
              --label "nieuwe-les" \
              --state open \
              --json number,labels \
              --jq '[.[] | select(.labels | map(.name) | index("verwerkt") | not)] | .[].number' \
              | tr '\n' ' ')
            echo "issue_numbers=$ISSUES" >> "$GITHUB_OUTPUT"
          fi

      - name: Verwerk issues
        if: steps.issues.outputs.issue_numbers != ''
        env:
          # Beide API keys beschikbaar — script kiest de juiste op basis van AI_PROVIDER
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Standaard: claude (ondersteunt afbeeldingen). Bij workflow_dispatch kan je kiezen.
          AI_PROVIDER: ${{ inputs.ai_provider || 'claude' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for ISSUE_NUM in ${{ steps.issues.outputs.issue_numbers }}; do
            echo "=========================================="
            echo "Verwerk issue #${ISSUE_NUM} met ${AI_PROVIDER}"
            echo "=========================================="

            # Haal issue data op en schrijf naar tijdelijk bestand (voorkomt shell-escaping problemen)
            gh issue view "$ISSUE_NUM" --json body,author,title > /tmp/issue.json
            echo "Issue JSON opgehaald:"
            python3 -c "import json; d=json.load(open('/tmp/issue.json')); print(f'  Titel: {d[\"title\"][:60]}'); print(f'  Auteur: {d[\"author\"][\"login\"]}'); print(f'  Body lengte: {len(d[\"body\"])} chars')"

            ISSUE_AUTHOR=$(python3 -c "import json; print(json.load(open('/tmp/issue.json'))['author']['login'])")
            ISSUE_TITLE=$(python3 -c "import json; print(json.load(open('/tmp/issue.json'))['title'][:60])")

            # Schrijf issue body naar apart bestand (kan multiline + speciale tekens bevatten)
            python3 -c "import json; f=open('/tmp/issue_body.txt','w'); f.write(json.load(open('/tmp/issue.json'))['body']); f.close()"

            # Reactie: bezig
            gh issue comment "$ISSUE_NUM" \
              --body "⏳ **Bezig met genereren...** De les wordt nu automatisch gemaakt met **${AI_PROVIDER}**. Dit duurt 1-3 minuten."

            # Draai het generatiescript — body via bestand, niet via env var
            export ISSUE_NUMBER="$ISSUE_NUM"
            export ISSUE_BODY_FILE="/tmp/issue_body.txt"
            export ISSUE_AUTHOR

            if python3 .github/scripts/generate-lesson.py; then
              # Lees het gegenereerde pad uit metadata
              LESSON_PATH=$(python3 -c "
          import os, json
          from pathlib import Path
          author = os.environ['ISSUE_AUTHOR']
          issue_nr = os.environ['ISSUE_NUMBER']
          for p in Path(author).rglob('metadata.json'):
              meta = json.loads(p.read_text())
              if str(meta.get('issue_number')) == issue_nr:
                  print(meta['generated_path'])
                  break
          ")

              # Commit en push
              git add -A
              git commit -m "Nieuwe les: ${ISSUE_TITLE} (issue #${ISSUE_NUM}, ${AI_PROVIDER})"
              git push

              # GitHub Pages URL
              REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
              REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
              PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}"

              # Lees kosten uit metadata
              META_FILE="${LESSON_PATH%/*}/metadata.json"
              COST_INFO=$(python3 -c "
          import json
          try:
              meta = json.load(open('${META_FILE}'))
              u = meta.get('usage', {})
              if u and u.get('estimated_cost_usd'):
                  inp = u.get('input_tokens', 0)
                  out = u.get('output_tokens', 0)
                  cost = u['estimated_cost_usd']
                  print(f'💰 **Kosten:** {inp:,} input + {out:,} output tokens = **\${cost:.4f}** (~€{cost*0.92:.4f})')
              else:
                  print('')
          except: print('')
          ")

              # Reactie: klaar
              COMMENT_BODY="✅ **Les gegenereerd!** (met ${AI_PROVIDER})

          De les is aangemaakt en direct naar main gecommit.

          📄 [Bekijk de bestanden](https://github.com/${{ github.repository }}/tree/main/${LESSON_PATH%/*})
          🌐 [Bekijk de les](${PAGES_URL}/${LESSON_PATH})"

              if [ -n "$COST_INFO" ]; then
                COMMENT_BODY="${COMMENT_BODY}

          ${COST_INFO}"
              fi

              gh issue comment "$ISSUE_NUM" --body "$COMMENT_BODY"

              # Label als verwerkt en sluit (maak label aan als het niet bestaat)
              gh label create "verwerkt" --color "0e8a16" --description "Les is gegenereerd" 2>/dev/null || true
              gh issue edit "$ISSUE_NUM" --add-label "verwerkt"
              gh issue close "$ISSUE_NUM" --reason completed
            else
              echo "FOUT bij verwerken van issue #${ISSUE_NUM}"
              gh issue comment "$ISSUE_NUM" \
                --body "❌ **Fout bij genereren met ${AI_PROVIDER}.** Er ging iets mis. Controleer de Actions-log voor details."
            fi
          done

      - name: Geen issues gevonden
        if: steps.issues.outputs.issue_numbers == ''
        run: echo "Geen onverwerkte issues gevonden met label 'nieuwe-les'."
