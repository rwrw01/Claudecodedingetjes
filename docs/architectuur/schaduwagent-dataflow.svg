<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0078D4"/>
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#0078D4"/>
    </marker>
    <marker id="arrowD" markerWidth="7" markerHeight="10" refX="3.5" refY="10" orient="auto">
      <polygon points="0 0, 3.5 10, 7 0" fill="#605E5C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#107C10"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF8C00"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8661C5"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#008272"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#FFFFFF"/>

  <!-- Title -->
  <rect x="0" y="0" width="1400" height="60" fill="#0078D4"/>
  <text x="40" y="38" fill="white" font-size="22" font-weight="600">Schaduwagent — Dataflow: Gebruiker, Servicedesk &amp; Systeem</text>
  <text x="1360" y="38" fill="white" font-size="12" text-anchor="end" opacity="0.8">Lichte modus | Alle data binnen EU</text>

  <!-- ==================== LEFT: GEBRUIKER ==================== -->
  <rect x="30" y="85" width="270" height="320" rx="10" fill="#F3F2F1" stroke="#E1DFDD" stroke-width="1" filter="url(#shadow)"/>
  <text x="165" y="110" fill="#323130" font-size="15" text-anchor="middle" font-weight="700">GEBRUIKER</text>
  <text x="165" y="128" fill="#605E5C" font-size="11" text-anchor="middle">Werkstation gemeente</text>

  <!-- User icon -->
  <circle cx="165" cy="170" r="28" fill="#DEECF9" stroke="#0078D4" stroke-width="2"/>
  <circle cx="165" cy="160" r="10" fill="#0078D4"/>
  <path d="M145,185 Q165,175 185,185" fill="none" stroke="#0078D4" stroke-width="3" stroke-linecap="round"/>

  <!-- User actions -->
  <rect x="55" y="215" width="220" height="30" rx="4" fill="white" stroke="#D83B01" stroke-width="1.5"/>
  <text x="165" y="235" fill="#D83B01" font-size="11" text-anchor="middle" font-weight="600">Ervaart storing / foutmelding</text>

  <rect x="55" y="255" width="220" height="30" rx="4" fill="white" stroke="#0078D4" stroke-width="1.5"/>
  <text x="165" y="275" fill="#0078D4" font-size="11" text-anchor="middle">Scherm wordt geobserveerd</text>

  <rect x="55" y="295" width="220" height="30" rx="4" fill="white" stroke="#8661C5" stroke-width="1.5"/>
  <text x="165" y="315" fill="#8661C5" font-size="11" text-anchor="middle">Chat: "Het werkt weer!"</text>

  <rect x="55" y="335" width="220" height="30" rx="4" fill="white" stroke="#107C10" stroke-width="1.5"/>
  <text x="165" y="355" fill="#107C10" font-size="11" text-anchor="middle" font-weight="600">Probleem opgelost</text>

  <!-- ==================== CENTER: SCHADUWAGENT ==================== -->
  <rect x="380" y="85" width="640" height="600" rx="10" fill="#FAFAFA" stroke="#0078D4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="380" y="85" width="640" height="40" rx="10" fill="#0078D4"/>
  <rect x="380" y="110" width="640" height="15" fill="#0078D4"/>
  <text x="700" y="110" fill="white" font-size="16" text-anchor="middle" font-weight="700">SCHADUWAGENT</text>

  <!-- Step 1: Detectie -->
  <rect x="405" y="140" width="280" height="65" rx="6" fill="white" stroke="#0078D4" stroke-width="1.5"/>
  <circle cx="425" cy="155" r="12" fill="#0078D4"/>
  <text x="425" y="159" fill="white" font-size="10" text-anchor="middle" font-weight="700">1</text>
  <text x="445" y="158" fill="#0078D4" font-size="12" font-weight="600">Detectie</text>
  <text x="420" y="177" fill="#323130" font-size="10">ScreenPipe: foutmelding gedetecteerd</text>
  <text x="420" y="192" fill="#605E5C" font-size="9" font-style="italic">Screenshot + OCR → MCP</text>

  <!-- Step 2: Diagnostiek -->
  <rect x="405" y="218" width="280" height="65" rx="6" fill="white" stroke="#107C10" stroke-width="1.5"/>
  <circle cx="425" cy="233" r="12" fill="#107C10"/>
  <text x="425" y="237" fill="white" font-size="10" text-anchor="middle" font-weight="700">2</text>
  <text x="445" y="236" fill="#107C10" font-size="12" font-weight="600">OS Diagnostiek</text>
  <text x="420" y="255" fill="#323130" font-size="10">Goose: logs, services, netwerk check</text>
  <text x="420" y="270" fill="#605E5C" font-size="9" font-style="italic">SSH/WinRM → Container sandbox</text>

  <!-- Step 3: Analyse -->
  <rect x="405" y="296" width="280" height="80" rx="6" fill="white" stroke="#005A9E" stroke-width="2"/>
  <circle cx="425" cy="311" r="12" fill="#005A9E"/>
  <text x="425" y="315" fill="white" font-size="10" text-anchor="middle" font-weight="700">3</text>
  <text x="445" y="314" fill="#005A9E" font-size="12" font-weight="600">AI Analyse (Claude EU)</text>
  <text x="420" y="335" fill="#323130" font-size="10">Correleert scherm + OS + CMDB data</text>
  <text x="420" y="350" fill="#323130" font-size="10">Root cause analysis + diagnose</text>
  <text x="420" y="365" fill="#605E5C" font-size="9" font-style="italic">Bedrock Frankfurt | Data blijft in EU</text>

  <!-- Step 4: Beslissing -->
  <!-- Diamond shape for decision -->
  <polygon points="545,395 590,425 545,455 500,425" fill="white" stroke="#FF8C00" stroke-width="2"/>
  <text x="545" y="422" fill="#FF8C00" font-size="10" text-anchor="middle" font-weight="700">Auto-fix?</text>
  <text x="545" y="434" fill="#FF8C00" font-size="10" text-anchor="middle" font-weight="700">Confidence</text>

  <!-- Step 5a: Auto-fix (rechts) -->
  <rect x="630" y="400" width="185" height="50" rx="6" fill="#E8F5E9" stroke="#107C10" stroke-width="1.5"/>
  <text x="722" y="420" fill="#107C10" font-size="11" text-anchor="middle" font-weight="600">Hoog: Auto-fix</text>
  <text x="722" y="436" fill="#323130" font-size="10" text-anchor="middle">Ansible playbook uitvoeren</text>

  <!-- Step 5b: Escaleer (links) -->
  <rect x="405" y="470" width="185" height="50" rx="6" fill="#FFF4CE" stroke="#FFB900" stroke-width="1.5"/>
  <text x="497" y="490" fill="#FF8C00" font-size="11" text-anchor="middle" font-weight="600">Laag: Escaleer</text>
  <text x="497" y="506" fill="#323130" font-size="10" text-anchor="middle">Naar servicedesk medewerker</text>

  <!-- Step 6: TOPdesk ticket -->
  <rect x="630" y="470" width="185" height="50" rx="6" fill="white" stroke="#008272" stroke-width="1.5"/>
  <circle cx="650" cy="485" r="10" fill="#008272"/>
  <text x="650" y="489" fill="white" font-size="8" text-anchor="middle" font-weight="700">6</text>
  <text x="665" y="490" fill="#008272" font-size="11" font-weight="600">TOPdesk Ticket</text>
  <text x="722" y="506" fill="#323130" font-size="10" text-anchor="middle">Rijke context + diagnose</text>

  <!-- Step 7: Chat Widget -->
  <rect x="405" y="540" width="280" height="55" rx="6" fill="white" stroke="#8661C5" stroke-width="1.5"/>
  <circle cx="425" cy="555" r="12" fill="#8661C5"/>
  <text x="425" y="559" fill="white" font-size="10" text-anchor="middle" font-weight="700">7</text>
  <text x="445" y="558" fill="#8661C5" font-size="12" font-weight="600">Chat Widget → Gebruiker</text>
  <text x="420" y="578" fill="#323130" font-size="10">"Het zaaksysteem werkt weer. Excuses voor het ongemak."</text>

  <!-- Step 8: Kennisbank -->
  <rect x="405" y="608" width="280" height="55" rx="6" fill="white" stroke="#008272" stroke-width="1.5"/>
  <circle cx="425" cy="623" r="12" fill="#008272"/>
  <text x="425" y="627" fill="white" font-size="10" text-anchor="middle" font-weight="700">8</text>
  <text x="445" y="626" fill="#008272" font-size="12" font-weight="600">Kennisbank bijwerken</text>
  <text x="420" y="648" fill="#323130" font-size="10">Oplossing opslaan voor toekomstige incidenten</text>

  <!-- Internal arrows -->
  <line x1="545" y1="205" x2="545" y2="218" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <line x1="545" y1="283" x2="545" y2="296" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <line x1="545" y1="376" x2="545" y2="395" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arrowD)"/>

  <!-- Decision arrows -->
  <line x1="590" y1="425" x2="630" y2="425" stroke="#107C10" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="608" y="418" fill="#107C10" font-size="9" font-weight="600">Ja</text>
  <line x1="545" y1="455" x2="497" y2="470" stroke="#FF8C00" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="510" y="460" fill="#FF8C00" font-size="9" font-weight="600">Nee</text>

  <!-- Auto-fix to ticket -->
  <line x1="722" y1="450" x2="722" y2="470" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arrowD)"/>

  <!-- Ticket to chat -->
  <line x1="630" y1="495" x2="597" y2="495" stroke="#605E5C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="545" y1="520" x2="545" y2="540" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <line x1="545" y1="595" x2="545" y2="608" stroke="#605E5C" stroke-width="1.5" marker-end="url(#arrowD)"/>

  <!-- ==================== RIGHT: SERVICEDESK ==================== -->
  <rect x="1100" y="85" width="270" height="320" rx="10" fill="#F3F2F1" stroke="#E1DFDD" stroke-width="1" filter="url(#shadow)"/>
  <text x="1235" y="110" fill="#323130" font-size="15" text-anchor="middle" font-weight="700">SERVICEDESK</text>
  <text x="1235" y="128" fill="#605E5C" font-size="11" text-anchor="middle">Medewerker / beheerder</text>

  <!-- SD icon -->
  <circle cx="1235" cy="170" r="28" fill="#E8F5E9" stroke="#107C10" stroke-width="2"/>
  <circle cx="1235" cy="160" r="10" fill="#107C10"/>
  <path d="M1215,185 Q1235,175 1255,185" fill="none" stroke="#107C10" stroke-width="3" stroke-linecap="round"/>
  <!-- Headset -->
  <path d="M1220,155 Q1220,140 1235,140 Q1250,140 1250,155" fill="none" stroke="#107C10" stroke-width="2"/>

  <!-- SD actions -->
  <rect x="1125" y="215" width="220" height="30" rx="4" fill="white" stroke="#FF8C00" stroke-width="1.5"/>
  <text x="1235" y="235" fill="#FF8C00" font-size="11" text-anchor="middle" font-weight="600">Dashboard: live meekijken</text>

  <rect x="1125" y="255" width="220" height="30" rx="4" fill="white" stroke="#FF8C00" stroke-width="1.5"/>
  <text x="1235" y="275" fill="#FF8C00" font-size="11" text-anchor="middle">Approval bij risicovolle actie</text>

  <rect x="1125" y="295" width="220" height="30" rx="4" fill="white" stroke="#008272" stroke-width="1.5"/>
  <text x="1235" y="315" fill="#008272" font-size="11" text-anchor="middle">TOPdesk ticket review</text>

  <rect x="1125" y="335" width="220" height="30" rx="4" fill="white" stroke="#8661C5" stroke-width="1.5"/>
  <text x="1235" y="355" fill="#8661C5" font-size="11" text-anchor="middle">Rapportage + trends</text>

  <!-- ==================== DATA FLOW ARROWS ==================== -->
  <!-- Gebruiker → Schaduwagent -->
  <line x1="300" y1="170" x2="380" y2="170" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <text x="340" y="162" fill="#0078D4" font-size="9" text-anchor="middle" font-weight="600">Screenshots</text>
  <text x="340" y="184" fill="#0078D4" font-size="9" text-anchor="middle">OS-data (SSH)</text>

  <!-- Schaduwagent → Gebruiker (chat) -->
  <line x1="380" y1="565" x2="300" y2="340" stroke="#8661C5" stroke-width="2" marker-end="url(#arrowL)" stroke-dasharray="6,3"/>
  <text x="320" y="450" fill="#8661C5" font-size="9" text-anchor="middle" transform="rotate(-50, 320, 450)" font-weight="600">Chat berichten</text>

  <!-- Schaduwagent → Servicedesk -->
  <line x1="1020" y1="230" x2="1100" y2="230" stroke="#FF8C00" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="1060" y="222" fill="#FF8C00" font-size="9" text-anchor="middle" font-weight="600">Dashboard</text>

  <!-- Schaduwagent → Servicedesk (escalatie) -->
  <line x1="590" y1="490" x2="1100" y2="275" stroke="#FF8C00" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="850" y="370" fill="#FF8C00" font-size="9" text-anchor="middle" transform="rotate(-14, 850, 370)">Escalatie + approval request</text>

  <!-- ==================== BOTTOM: EXTERNE SYSTEMEN ==================== -->
  <rect x="30" y="710" width="1340" height="80" rx="8" fill="white" stroke="#E1DFDD" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="735" fill="#323130" font-size="13" font-weight="600">Externe Systemen (alle API-first, open standaarden)</text>

  <!-- TOPdesk ext -->
  <rect x="60" y="748" width="180" height="30" rx="4" fill="#008272"/>
  <text x="150" y="768" fill="white" font-size="11" text-anchor="middle" font-weight="600">TOPdesk (REST API)</text>

  <!-- CMDBuild ext -->
  <rect x="260" y="748" width="180" height="30" rx="4" fill="#008272"/>
  <text x="350" y="768" fill="white" font-size="11" text-anchor="middle" font-weight="600">CMDBuild (AGPL, EU)</text>

  <!-- Monitoring -->
  <rect x="460" y="748" width="180" height="30" rx="4" fill="#008272"/>
  <text x="550" y="768" fill="white" font-size="11" text-anchor="middle" font-weight="600">Grafana + OTel</text>

  <!-- Bedrock EU -->
  <rect x="660" y="748" width="200" height="30" rx="4" fill="#005A9E"/>
  <text x="760" y="768" fill="white" font-size="11" text-anchor="middle" font-weight="600">AWS Bedrock EU (Claude)</text>

  <!-- Mistral -->
  <rect x="880" y="748" width="180" height="30" rx="4" fill="#107C10"/>
  <text x="970" y="768" fill="white" font-size="11" text-anchor="middle" font-weight="600">Mistral (lokaal, Ollama)</text>

  <!-- Kennisbank ext -->
  <rect x="1080" y="748" width="180" height="30" rx="4" fill="#008272"/>
  <text x="1170" y="768" fill="white" font-size="11" text-anchor="middle" font-weight="600">PostgreSQL (EU)</text>

  <!-- Arrows from Schaduwagent to external systems -->
  <line x1="450" y1="663" x2="150" y2="748" stroke="#008272" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <line x1="500" y1="663" x2="350" y2="748" stroke="#008272" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <line x1="560" y1="663" x2="550" y2="748" stroke="#008272" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <line x1="620" y1="663" x2="760" y2="748" stroke="#005A9E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowR)"/>
  <line x1="680" y1="663" x2="970" y2="748" stroke="#107C10" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <line x1="700" y1="663" x2="1170" y2="748" stroke="#008272" stroke-width="1.5" marker-end="url(#arrowTeal)"/>

  <!-- ==================== LEGEND ==================== -->
  <rect x="30" y="810" width="1340" height="80" rx="8" fill="#FAF9F8" stroke="#E1DFDD" stroke-width="1"/>
  <text x="50" y="835" fill="#323130" font-size="12" font-weight="700">Legenda</text>

  <!-- Legend items -->
  <line x1="50" y1="855" x2="90" y2="855" stroke="#0078D4" stroke-width="2.5"/>
  <text x="100" y="859" fill="#323130" font-size="10">Schermdata (screenshots, OCR)</text>

  <line x1="260" y1="855" x2="300" y2="855" stroke="#107C10" stroke-width="2.5"/>
  <text x="310" y="859" fill="#323130" font-size="10">OS-data (logs, services)</text>

  <line x1="470" y1="855" x2="510" y2="855" stroke="#8661C5" stroke-width="2.5"/>
  <text x="520" y="859" fill="#323130" font-size="10">Chatberichten (begrijpelijke taal)</text>

  <line x1="720" y1="855" x2="760" y2="855" stroke="#FF8C00" stroke-width="2.5"/>
  <text x="770" y="859" fill="#323130" font-size="10">Escalatie / approval</text>

  <line x1="930" y1="855" x2="970" y2="855" stroke="#008272" stroke-width="2.5"/>
  <text x="980" y="859" fill="#323130" font-size="10">API-integraties (REST/MCP)</text>

  <line x1="1140" y1="855" x2="1180" y2="855" stroke="#005A9E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="1190" y="859" fill="#323130" font-size="10">LLM-calls (EU-regio)</text>

  <!-- EU badge bottom right -->
  <rect x="1280" y="822" width="70" height="24" rx="4" fill="#003399"/>
  <text x="1315" y="839" fill="#FFCC00" font-size="11" text-anchor="middle" font-weight="700">EU DATA</text>

</svg>
